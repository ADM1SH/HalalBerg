<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quantum Terminal - Watchlist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#2f3034",
                    "outline-variant": "#45474a",
                    "on-secondary-fixed": "#191c22",
                    "on-primary-fixed": "#1a1c1f",
                    "primary": "#c6c6ca",
                    "primary-fixed-dim": "#c6c6ca",
                    "on-tertiary-fixed-variant": "#005321",
                    "inverse-on-surface": "#233143",
                    "surface-container": "#122131",
                    "tertiary": "#4ae176",
                    "surface-tint": "#c6c6ca",
                    "surface-dim": "#051424",
                    "surface-bright": "#2c3a4c",
                    "secondary-fixed-dim": "#c4c6ce",
                    "surface-container-highest": "#273647",
                    "secondary-container": "#464950",
                    "on-surface-variant": "#c6c6ca",
                    "on-secondary-container": "#b6b8c0",
                    "secondary-fixed": "#e1e2ea",
                    "secondary": "#c4c6ce",
                    "on-tertiary-fixed": "#002109",
                    "on-primary-fixed-variant": "#45474a",
                    "on-tertiary": "#003915",
                    "on-error": "#690005",
                    "primary-fixed": "#e2e2e6",
                    "tertiary-container": "#001906",
                    "on-error-container": "#ffdad6",
                    "surface": "#051424",
                    "tertiary-fixed-dim": "#4ae176",
                    "primary-container": "#121417",
                    "on-secondary-fixed-variant": "#44474d",
                    "surface-variant": "#273647",
                    "outline": "#8f9094",
                    "on-surface": "#d4e4fa",
                    "surface-container-lowest": "#010f1f",
                    "on-secondary": "#2d3037",
                    "on-background": "#d4e4fa",
                    "background": "#051424",
                    "surface-container-high": "#1c2b3c",
                    "error": "#ffb4ab",
                    "tertiary-fixed": "#6bff8f",
                    "error-container": "#93000a",
                    "inverse-primary": "#5d5e62",
                    "inverse-surface": "#d4e4fa",
                    "on-tertiary-container": "#009241",
                    "on-primary-container": "#7d7e82",
                    "surface-container-low": "#0d1c2d"
            },
            "borderRadius": {
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "0px"
            },
            "spacing": {
                    "stack-default": "12px",
                    "gutter": "1px",
                    "container-padding": "8px",
                    "edge-margin": "0px",
                    "unit": "4px",
                    "stack-compact": "4px"
            },
            "fontFamily": {
                    "label-xs": [
                            "JetBrains Mono"
                    ],
                    "data-tabular": [
                            "JetBrains Mono"
                    ],
                    "headline-md": [
                            "Inter"
                    ],
                    "ticker-sm": [
                            "JetBrains Mono"
                    ],
                    "display-lg": [
                            "Inter"
                    ],
                    "body-sm": [
                            "Inter"
                    ]
            },
            "fontSize": {
                    "label-xs": [
                            "11px",
                            {
                                    "lineHeight": "14px",
                                    "fontWeight": "500"
                            }
                    ],
                    "data-tabular": [
                            "13px",
                            {
                                    "lineHeight": "16px",
                                    "fontWeight": "500"
                            }
                    ],
                    "headline-md": [
                            "18px",
                            {
                                    "lineHeight": "24px",
                                    "letterSpacing": "-0.01em",
                                    "fontWeight": "600"
                            }
                    ],
                    "ticker-sm": [
                            "12px",
                            {
                                    "lineHeight": "16px",
                                    "fontWeight": "700"
                            }
                    ],
                    "display-lg": [
                            "24px",
                            {
                                    "lineHeight": "32px",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-sm": [
                            "13px",
                            {
                                    "lineHeight": "18px",
                                    "fontWeight": "400"
                            }
                    ]
            }
        },
        },
      }
    </script>
<style>
        body {
            background-color: #000000;
            color: #FFFFFF;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        /* Custom thin scrollbar if needed */
        .thin-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .thin-scrollbar::-webkit-scrollbar-track {
            background: #000000;
        }
        .thin-scrollbar::-webkit-scrollbar-thumb {
            background: #00FFFF;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden antialiased bg-[#000000]">
<!-- TopAppBar from JSON -->
<header class="bg-[#000000] text-[#FFFFFF] border-b border-[#00FFFF] w-full px-container-padding h-12 flex justify-between items-center z-50 flex-shrink-0">
<div class="flex items-center gap-unit">
<span class="font-display-lg text-display-lg font-black text-[#FFFFFF] uppercase tracking-tighter">QUANTUM TERMINAL</span>
</div>
<div class="flex items-center gap-unit">
<button class="text-[#FFFFFF] hover:bg-[#00FFFF]/20 transition-colors p-1 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
</button>
<button class="text-[#FFFFFF] hover:bg-[#00FFFF]/20 transition-colors p-1 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="keyboard_command_key">keyboard_command_key</span>
</button>
<button class="text-[#FFFFFF] hover:bg-[#00FFFF]/20 transition-colors p-1 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="text-[#FFFFFF] hover:bg-[#00FFFF]/20 transition-colors p-1 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<!-- Command Input -->
<div class="px-container-padding py-unit bg-[#000000] border-b border-[#00FFFF] flex-shrink-0">
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-2 text-[#FFFFFF]" style="font-size: 16px;">search</span>
<input class="w-full bg-[#000000] border border-[#00FFFF] text-[#FFFFFF] font-mono text-label-xs py-unit pl-8 pr-unit focus:outline-none focus:border-[#00FFFF] placeholder-[#FFFFFF] transition-colors h-8 rounded-none" placeholder="/COMMAND OR TICKER" type="text"/>
</div>
</div>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto thin-scrollbar bg-[#000000]">
<!-- Watchlist Data Table -->
<div class="flex flex-col border border-[#00FFFF] m-2">
<!-- Table Header -->
<div class="flex justify-between px-container-padding py-unit bg-[#000000] border-b border-[#00FFFF] text-[#FFFFFF] font-mono text-label-xs">
<div class="w-1/3">SYMBOL</div>
<div class="w-1/3 text-right">PRICE</div>
<div class="w-1/3 text-right">CHANGE</div>
</div>
<!-- Table Rows -->
<div class="flex flex-col">
<!-- AAPL -->
<div class="flex items-center justify-between px-container-padding py-2 border-b border-[#00FFFF] bg-[#000000] hover:bg-[#00FFFF]/20 transition-colors cursor-pointer">
<div class="w-1/3 flex flex-col">
<span class="font-mono text-ticker-sm text-[#FFFFFF]">AAPL</span>
<span class="font-mono text-label-xs text-[#FFFFFF]">Apple Inc.</span>
</div>
<div class="w-1/3 text-right">
<span class="font-mono text-data-tabular text-[#FFFFFF]">173.50</span>
</div>
<div class="w-1/3 text-right flex justify-end">
<div class="bg-[#000000] border border-[#00FF00] px-1 py-0.5 min-w-[60px] text-center rounded-none">
<span class="font-mono text-data-tabular text-[#00FF00]">+1.24%</span>
</div>
</div>
</div>
<!-- MSFT -->
<div class="flex items-center justify-between px-container-padding py-2 border-b border-[#00FFFF] bg-[#000000] hover:bg-[#00FFFF]/20 transition-colors cursor-pointer">
<div class="w-1/3 flex flex-col">
<span class="font-mono text-ticker-sm text-[#FFFFFF]">MSFT</span>
<span class="font-mono text-label-xs text-[#FFFFFF]">Microsoft</span>
</div>
<div class="w-1/3 text-right">
<span class="font-mono text-data-tabular text-[#FFFFFF]">412.30</span>
</div>
<div class="w-1/3 text-right flex justify-end">
<div class="bg-[#000000] border border-[#00FF00] px-1 py-0.5 min-w-[60px] text-center rounded-none">
<span class="font-mono text-data-tabular text-[#00FF00]">+0.85%</span>
</div>
</div>
</div>
<!-- GOOGL -->
<div class="flex items-center justify-between px-container-padding py-2 border-b border-[#00FFFF] bg-[#000000] hover:bg-[#00FFFF]/20 transition-colors cursor-pointer">
<div class="w-1/3 flex flex-col">
<span class="font-mono text-ticker-sm text-[#FFFFFF]">GOOGL</span>
<span class="font-mono text-label-xs text-[#FFFFFF]">Alphabet</span>
</div>
<div class="w-1/3 text-right">
<span class="font-mono text-data-tabular text-[#FFFFFF]">144.12</span>
</div>
<div class="w-1/3 text-right flex justify-end">
<div class="bg-[#000000] border border-[#FF0000] px-1 py-0.5 min-w-[60px] text-center rounded-none">
<span class="font-mono text-data-tabular text-[#FF0000]">-0.32%</span>
</div>
</div>
</div>
<!-- AMZN -->
<div class="flex items-center justify-between px-container-padding py-2 border-b border-[#00FFFF] bg-[#000000] hover:bg-[#00FFFF]/20 transition-colors cursor-pointer">
<div class="w-1/3 flex flex-col">
<span class="font-mono text-ticker-sm text-[#FFFFFF]">AMZN</span>
<span class="font-mono text-label-xs text-[#FFFFFF]">Amazon</span>
</div>
<div class="w-1/3 text-right">
<span class="font-mono text-data-tabular text-[#FFFFFF]">178.22</span>
</div>
<div class="w-1/3 text-right flex justify-end">
<div class="bg-[#000000] border border-[#00FF00] px-1 py-0.5 min-w-[60px] text-center rounded-none">
<span class="font-mono text-data-tabular text-[#00FF00]">+2.10%</span>
</div>
</div>
</div>
<!-- TSLA -->
<div class="flex items-center justify-between px-container-padding py-2 border-b border-[#00FFFF] bg-[#000000] hover:bg-[#00FFFF]/20 transition-colors cursor-pointer">
<div class="w-1/3 flex flex-col">
<span class="font-mono text-ticker-sm text-[#FFFFFF]">TSLA</span>
<span class="font-mono text-label-xs text-[#FFFFFF]">Tesla</span>
</div>
<div class="w-1/3 text-right">
<span class="font-mono text-data-tabular text-[#FFFFFF]">198.50</span>
</div>
<div class="w-1/3 text-right flex justify-end">
<div class="bg-[#000000] border border-[#FF0000] px-1 py-0.5 min-w-[60px] text-center rounded-none">
<span class="font-mono text-data-tabular text-[#FF0000]">-1.45%</span>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Mobile Bottom Navigation (Custom for this view) -->
<nav class="md:hidden bg-[#000000] border-t border-[#00FFFF] flex justify-around items-center h-16 flex-shrink-0">
<!-- Active Tab: Watchlist -->
<a class="flex flex-col items-center justify-center w-full h-full text-[#FFFFFF] border-t-2 border-[#00FFFF]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="list_alt" style="font-variation-settings: 'FILL' 1;">list_alt</span>
<span class="font-mono text-label-xs">Watchlist</span>
</a>
<!-- Inactive Tab: Charts -->
<a class="flex flex-col items-center justify-center w-full h-full text-[#FFFFFF] hover:bg-[#00FFFF]/20 transition-colors border-t-2 border-transparent" href="#">
<span class="material-symbols-outlined mb-1" data-icon="candlestick_chart">candlestick_chart</span>
<span class="font-mono text-label-xs">Charts</span>
</a>
<!-- Inactive Tab: Screener -->
<a class="flex flex-col items-center justify-center w-full h-full text-[#FFFFFF] hover:bg-[#00FFFF]/20 transition-colors border-t-2 border-transparent" href="#">
<span class="material-symbols-outlined mb-1" data-icon="filter_list">filter_list</span>
<span class="font-mono text-label-xs">Screener</span>
</a>
<!-- Inactive Tab: News -->
<a class="flex flex-col items-center justify-center w-full h-full text-[#FFFFFF] hover:bg-[#00FFFF]/20 transition-colors border-t-2 border-transparent" href="#">
<span class="material-symbols-outlined mb-1" data-icon="feed">feed</span>
<span class="font-mono text-label-xs">News</span>
</a>
</nav>
</body></html>
